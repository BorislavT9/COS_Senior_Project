<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Ingestion & Extraction</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #333; }
        nav { margin: 1.5rem 0; }
        nav a { margin-right: 1rem; color: #0066cc; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; background: #fafafa; }
        button { padding: 0.5rem 1rem; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #0052a3; }
        input[type="text"] { padding: 0.5rem; width: 100%; max-width: 400px; margin: 0.5rem 0; }
        #scan-result { margin-top: 1rem; padding: 1rem; background: #e8f4f8; border-radius: 4px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Document Ingestion & Extraction</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/rules-page">Rules</a>
        <a href="/results-page">Results</a>
        <a href="/logs-page">Logs</a>
        <a href="/docs">API Docs</a>
    </nav>

    <div class="card">
        <h2>Run Scan</h2>
        <p>Scan a directory for PDF, DOCX, TXT, XLSX files. New and modified files are processed with active rules.</p>
        <label>Watch directory (optional, default: sample_docs):</label><br>
        <input type="text" id="watch-dir" placeholder="./sample_docs">
        <br>
        <button id="run-scan">Run Scan</button>
        <div id="scan-result"></div>
    </div>

    <script>
        document.getElementById('run-scan').onclick = async () => {
            const dir = document.getElementById('watch-dir').value.trim();
            const resultEl = document.getElementById('scan-result');
            resultEl.textContent = 'Scanning...';
            try {
                const body = dir ? { watch_dir: dir } : {};
                const res = await fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                resultEl.textContent = 'Error: ' + e.message;
            }
        };
    </script>
</body>
</html>
