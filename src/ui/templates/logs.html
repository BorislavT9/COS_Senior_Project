<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs - Document Ingestion</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #333; }
        nav { margin: 1.5rem 0; }
        nav a { margin-right: 1rem; color: #0066cc; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f0f0f0; }
        .level-ERROR { color: red; }
        .level-WARNING { color: orange; }
    </style>
</head>
<body>
    <h1>Application Logs</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/rules-page">Rules</a>
        <a href="/results-page">Results</a>
        <a href="/logs-page">Logs</a>
    </nav>

    <p>Filter by level: <input id="level-filter" placeholder="INFO, WARNING, ERROR"> <button id="load-btn">Load</button></p>

    <table id="logs-table">
        <thead><tr><th>ID</th><th>Level</th><th>Message</th><th>Context</th><th>Created</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        async function loadLogs() {
            const level = document.getElementById('level-filter').value.trim();
            const url = level ? `/logs?level=${encodeURIComponent(level)}` : '/logs';
            const res = await fetch(url);
            const data = await res.json();
            const tbody = document.querySelector('#logs-table tbody');
            tbody.innerHTML = data.map(r => `
                <tr class="level-${r.level}">
                    <td>${r.id}</td>
                    <td>${r.level}</td>
                    <td>${r.message}</td>
                    <td>${r.context || '-'}</td>
                    <td>${r.created_at}</td>
                </tr>
            `).join('');
        }
        document.getElementById('load-btn').onclick = loadLogs;
        loadLogs();
    </script>
</body>
</html>
